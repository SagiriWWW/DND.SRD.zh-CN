site_name: D&D 5E SRD 中文本地版
site_description: 非官方 D&D 5E SRD 中文 Markdown 整理版，内容主要由机器翻译生成并经过批量术语清理。
site_url: https://sagiriwww.github.io/DND.SRD.zh-CN/
repo_url: https://github.com/SagiriWWW/DND.SRD.zh-CN
repo_name: SagiriWWW/DND.SRD.zh-CN

docs_dir: .
site_dir: /tmp/mkdocs-site

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

exclude_docs: |
  .git/
  .github/
  .gitignore
